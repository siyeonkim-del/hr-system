<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR 시스템</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #0a0e1a; color: #f1f5f9; display: flex; min-height: 100vh; }
 
  /* Sidebar */
  #sidebar { width: 200px; background: #0d1120; border-right: 1px solid #1e2a42; padding: 24px 14px; display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; }
  #sidebar .logo { font-size: 20px; font-weight: 900; margin-bottom: 6px; }
  #sidebar .logo-sub { font-size: 10px; color: #3b82f6; letter-spacing: 2px; margin-bottom: 28px; }
  .nav-btn { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; border: 1px solid transparent; background: none; color: #64748b; cursor: pointer; font-size: 13px; font-weight: 600; width: 100%; margin-bottom: 4px; text-align: left; font-family: inherit; transition: all 0.15s; }
  .nav-btn.active { background: #3b82f611; border-color: #3b82f633; color: #3b82f6; }
  .nav-btn:hover:not(.active) { color: #94a3b8; }
  .user-card { margin-top: auto; background: #161b2e; border: 1px solid #1e2a42; border-radius: 12px; padding: 14px; }
  .user-card .label { font-size: 11px; color: #64748b; }
  .user-card .name { font-size: 13px; font-weight: 700; margin-top: 2px; }
  .user-card .role { font-size: 11px; color: #3b82f6; }
 
  /* Main */
  #main { margin-left: 200px; padding: 32px; flex: 1; }
  .page { display: none; }
  .page.active { display: block; }
  .page-title { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
  .page-sub { color: #64748b; font-size: 13px; margin-bottom: 24px; }
 
  /* Cards */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: #161b2e; border: 1px solid #1e2a42; border-radius: 16px; padding: 20px 24px; }
  .stat-card .label { color: #64748b; font-size: 12px; margin-bottom: 8px; }
  .stat-card .value { font-size: 26px; font-weight: 800; }
  .stat-card .sub { font-size: 11px; margin-top: 6px; }
 
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .card { background: #161b2e; border: 1px solid #1e2a42; border-radius: 16px; padding: 24px; }
  .card-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
 
  /* Employee */
  .emp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .emp-card { background: #161b2e; border: 1px solid #1e2a42; border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.2s; }
  .emp-card:hover { border-color: #3b82f644; }
  .emp-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
  .emp-name { font-size: 15px; font-weight: 800; }
  .emp-role { font-size: 12px; color: #64748b; margin-top: 2px; }
  .emp-dept { font-size: 11px; font-weight: 600; margin-top: 3px; }
  .emp-footer { border-top: 1px solid #1e2a42; padding-top: 12px; font-size: 12px; color: #64748b; }
  .emp-footer span { color: #94a3b8; }
 
  /* Search */
  .search-bar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; justify-content: space-between; }
  input[type=text], input[type=date], select, textarea {
    background: #0f1420; border: 1px solid #1e2a42; border-radius: 8px;
    padding: 8px 12px; color: #f1f5f9; font-size: 13px; font-family: inherit; outline: none; width: 100%;
  }
  input[type=text]:focus, input[type=date]:focus, select:focus { border-color: #3b82f644; }
 
  /* Leave */
  .leave-item { background: #0f1420; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .leave-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .leave-name { font-weight: 700; font-size: 14px; }
  .leave-info { font-size: 12px; color: #64748b; margin-bottom: 6px; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  .btn { border-radius: 8px; padding: 7px 16px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 600; border: 1px solid; background: none; }
 
  /* Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-full { margin-bottom: 10px; }
 
  /* Performance */
  .perf-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .perf-card { background: #161b2e; border: 1px solid #1e2a42; border-radius: 16px; padding: 22px; }
  .perf-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .grade-badge { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; border: 2px solid; }
  .bar-row { margin-bottom: 10px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; color: #64748b; }
  .bar-track { height: 5px; background: #0f1420; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .perf-footer { display: flex; justify-content: space-between; margin-top: 14px; padding-top: 12px; border-top: 1px solid #1e2a42; }
 
  /* Org */
  .org-wrap { overflow-x: auto; padding: 40px; background: #161b2e; border: 1px solid #1e2a42; border-radius: 20px; }
  .org-tree { display: flex; justify-content: center; }
  .org-node { display: flex; flex-direction: column; align-items: center; }
  .org-box { background: #0d1120; border-radius: 12px; padding: 12px 18px; min-width: 130px; text-align: center; border: 1.5px solid; }
  .org-box .o-name { font-size: 13px; font-weight: 700; margin-top: 8px; }
  .org-box .o-role { font-size: 11px; color: #64748b; margin-top: 2px; }
  .org-box .o-dept { font-size: 10px; font-weight: 600; margin-top: 4px; }
  .org-line-v { width: 2px; height: 20px; background: #1e2a42; }
  .org-line-h { height: 2px; background: #1e2a42; position: absolute; top: 0; }
  .org-children { display: flex; gap: 16px; align-items: flex-start; position: relative; }
  .org-child { display: flex; flex-direction: column; align-items: center; }
 
  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: #00000088; z-index: 200; display: none; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: #0d1120; border: 1px solid #1e2a42; border-radius: 20px; padding: 32px; width: 420px; max-width: 90vw; }
  .modal-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e2a42; font-size: 13px; }
  .modal-row .k { color: #64748b; }
  .modal-row .v { color: #f1f5f9; font-weight: 600; }
 
  /* Attendance */
  .att-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1e2a4222; font-size: 13px; }
 
  /* Legend */
  .legend { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #94a3b8; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
 
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: #0a0e1a; }
  ::-webkit-scrollbar-thumb { background: #1e2a42; border-radius: 4px; }
</style>
</head>
<body>
 
<!-- Sidebar -->
<div id="sidebar">
  <div class="logo">HR·OS</div>
  <div class="logo-sub">PEOPLE PLATFORM</div>
  <button class="nav-btn active" onclick="showPage('dashboard')">◈ 대시보드</button>
  <button class="nav-btn" onclick="showPage('employees')">◉ 직원 관리</button>
  <button class="nav-btn" onclick="showPage('leave')">◷ 휴가·근태</button>
  <button class="nav-btn" onclick="showPage('performance')">◆ 성과 평가</button>
  <button class="nav-btn" onclick="showPage('org')">◌ 조직도</button>
  <div class="user-card">
    <div class="label">관리자</div>
    <div class="name">박재원</div>
    <div class="role">대표이사</div>
  </div>
</div>
 
<!-- Main -->
<div id="main">
 
  <!-- 대시보드 -->
  <div id="page-dashboard" class="page active">
    <div class="page-title">대시보드</div>
    <div class="page-sub">2025년 4월 · 전사 현황</div>
    <div class="stat-grid">
      <div class="stat-card" style="border-left:3px solid #3b82f6">
        <div class="label">전체 직원</div>
        <div class="value">7명</div>
        <div class="sub" style="color:#3b82f6">이번 달 신규 1명</div>
      </div>
      <div class="stat-card" style="border-left:3px solid #f59e0b">
        <div class="label">휴가 대기</div>
        <div class="value" id="dash-pending">2건</div>
        <div class="sub" style="color:#f59e0b">처리 필요</div>
      </div>
      <div class="stat-card" style="border-left:3px solid #10b981">
        <div class="label">평균 성과 점수</div>
        <div class="value">87.2점</div>
        <div class="sub" style="color:#10b981">전분기 대비 +3.1</div>
      </div>
      <div class="stat-card" style="border-left:3px solid #8b5cf6">
        <div class="label">평균 출근율</div>
        <div class="value">96.8%</div>
        <div class="sub" style="color:#8b5cf6">목표 95% 달성</div>
      </div>
    </div>
    <div class="grid2">
      <div class="card">
        <div class="card-title">부서별 인원</div>
        <div id="dept-bars"></div>
      </div>
      <div class="card">
        <div class="card-title">최근 휴가 신청</div>
        <div id="dash-leaves"></div>
      </div>
    </div>
  </div>
 
  <!-- 직원 관리 -->
  <div id="page-employees" class="page">
    <div class="search-bar">
      <div>
        <div class="page-title">직원 관리</div>
        <div class="page-sub" style="margin-bottom:0">전체 7명</div>
      </div>
      <input type="text" id="emp-search" placeholder="이름, 부서, 직무 검색..." style="width:220px" oninput="renderEmps()">
    </div>
    <div class="emp-grid" id="emp-grid"></div>
  </div>
 
  <!-- 휴가·근태 -->
  <div id="page-leave" class="page">
    <div class="page-title">휴가 · 근태 관리</div>
    <div class="page-sub">신청 현황 및 연차 관리</div>
    <div class="grid2">
      <div>
        <div class="card" style="margin-bottom:16px">
          <div class="card-title">휴가 신청 목록</div>
          <div id="leave-list"></div>
        </div>
      </div>
      <div>
        <div class="card" style="margin-bottom:16px">
          <div class="card-title">휴가 신청</div>
          <div class="form-grid">
            <select id="lv-emp"><option value="">직원 선택</option></select>
            <select id="lv-type">
              <option>연차</option><option>반차</option><option>병가</option><option>경조사</option>
            </select>
            <input type="date" id="lv-from">
            <input type="date" id="lv-to">
          </div>
          <div class="form-full"><input type="text" id="lv-reason" placeholder="사유"></div>
          <button class="btn" style="color:#3b82f6;border-color:#3b82f644;width:100%" onclick="addLeave()">신청하기</button>
        </div>
        <div class="card">
          <div class="card-title">연차 현황</div>
          <div id="att-list"></div>
        </div>
      </div>
    </div>
  </div>
 
  <!-- 성과 평가 -->
  <div id="page-performance" class="page">
    <div class="page-title">성과 평가</div>
    <div class="page-sub">2025년 상반기 평가 결과</div>
    <div class="perf-grid" id="perf-grid"></div>
  </div>
 
  <!-- 조직도 -->
  <div id="page-org" class="page">
    <div class="page-title">조직도</div>
    <div class="page-sub">전사 조직 구조</div>
    <div class="legend" id="org-legend"></div>
    <div class="org-wrap">
      <div class="org-tree" id="org-tree"></div>
    </div>
  </div>
 
</div>
 
<!-- Modal -->
<div class="modal-bg" id="emp-modal" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
      <div id="modal-avatar" class="avatar" style="width:60px;height:60px;font-size:18px"></div>
      <div>
        <div id="modal-name" style="font-size:20px;font-weight:900"></div>
        <div id="modal-role" style="color:#64748b;font-size:13px"></div>
        <div id="modal-dept" style="font-size:12px;margin-top:3px"></div>
      </div>
    </div>
    <div id="modal-rows"></div>
    <button class="btn" style="color:#64748b;border-color:#64748b44;width:100%;margin-top:20px" onclick="closeModal()">닫기</button>
  </div>
</div>
 
<script>
const deptColors = { "개발팀":"#3b82f6","디자인팀":"#8b5cf6","마케팅팀":"#f59e0b","경영팀":"#10b981" };
const gradeColors = { S:"#f59e0b",A:"#10b981",B:"#3b82f6",C:"#ef4444" };
const statusColors = { "승인":"#10b981","대기":"#f59e0b","반려":"#ef4444" };
 
const employees = [
  {id:1,name:"김민준",dept:"개발팀",role:"시니어 개발자",level:"팀장",avatar:"KM",email:"minjun@company.com",phone:"010-1234-5678",joinDate:"2020-03-15",salary:"6,800만원",status:"재직",manager:"이서연"},
  {id:2,name:"이서연",dept:"개발팀",role:"개발팀장",level:"부장",avatar:"LS",email:"seoyeon@company.com",phone:"010-2345-6789",joinDate:"2018-01-10",salary:"8,200만원",status:"재직",manager:"박재원"},
  {id:3,name:"박지우",dept:"디자인팀",role:"UX 디자이너",level:"대리",avatar:"PJ",email:"jiwoo@company.com",phone:"010-3456-7890",joinDate:"2022-06-01",salary:"4,500만원",status:"재직",manager:"최유진"},
  {id:4,name:"최유진",dept:"디자인팀",role:"디자인팀장",level:"차장",avatar:"CY",email:"yujin@company.com",phone:"010-4567-8901",joinDate:"2019-09-20",salary:"7,100만원",status:"재직",manager:"박재원"},
  {id:5,name:"정도현",dept:"마케팅팀",role:"마케터",level:"사원",avatar:"JD",email:"dohyun@company.com",phone:"010-5678-9012",joinDate:"2023-03-01",salary:"3,800만원",status:"재직",manager:"한소희"},
  {id:6,name:"한소희",dept:"마케팅팀",role:"마케팅팀장",level:"과장",avatar:"HS",email:"sohee@company.com",phone:"010-6789-0123",joinDate:"2021-01-15",salary:"5,900만원",status:"재직",manager:"박재원"},
  {id:7,name:"박재원",dept:"경영팀",role:"대표이사",level:"임원",avatar:"PW",email:"jaewon@company.com",phone:"010-7890-1234",joinDate:"2015-01-01",salary:"1억 5천만원",status:"재직",manager:"-"},
];
 
let leaves = [
  {id:1,emp:"김민준",type:"연차",from:"2025-04-14",to:"2025-04-16",days:3,status:"승인",reason:"가족 여행"},
  {id:2,emp:"박지우",type:"반차",from:"2025-04-18",to:"2025-04-18",days:0.5,status:"대기",reason:"병원 방문"},
  {id:3,emp:"정도현",type:"연차",from:"2025-04-22",to:"2025-04-23",days:2,status:"대기",reason:"개인 사유"},
  {id:4,emp:"한소희",type:"병가",from:"2025-04-10",to:"2025-04-11",days:2,status:"승인",reason:"감기"},
  {id:5,emp:"최유진",type:"연차",from:"2025-05-05",to:"2025-05-07",days:3,status:"반려",reason:"휴식"},
];
 
const attendance = {
  "김민준":{used:7,total:15,att:98},"이서연":{used:3,total:15,att:100},
  "박지우":{used:5,total:15,att:95},"최유진":{used:8,total:15,att:97},
  "정도현":{used:2,total:15,att:92},"한소희":{used:6,total:15,att:99},
};
 
const performance = [
  {emp:"김민준",dept:"개발팀",score:92,kpi:95,peer:88,growth:"+5%",grade:"S",comment:"탁월한 기술력과 팀 리더십 발휘"},
  {emp:"이서연",dept:"개발팀",score:88,kpi:90,peer:85,growth:"+3%",grade:"A",comment:"일관된 성과와 멘토링 역할 충실"},
  {emp:"박지우",dept:"디자인팀",score:85,kpi:82,peer:90,growth:"+8%",grade:"A",comment:"창의적 디자인으로 제품 품질 향상"},
  {emp:"최유진",dept:"디자인팀",score:91,kpi:93,peer:87,growth:"+4%",grade:"S",comment:"팀 문화 개선 및 프로세스 혁신"},
  {emp:"정도현",dept:"마케팅팀",score:76,kpi:75,peer:78,growth:"+12%",grade:"B",comment:"빠른 성장세, 추가 역량 개발 필요"},
  {emp:"한소희",dept:"마케팅팀",score:89,kpi:91,peer:86,growth:"+6%",grade:"A",comment:"캠페인 성과 우수, 데이터 활용 뛰어남"},
];
 
const orgData = {
  name:"박재원",role:"대표이사",dept:"경영팀",avatar:"PW",
  children:[
    {name:"이서연",role:"개발팀장",dept:"개발팀",avatar:"LS",children:[
      {name:"김민준",role:"시니어 개발자",dept:"개발팀",avatar:"KM",children:[]}
    ]},
    {name:"최유진",role:"디자인팀장",dept:"디자인팀",avatar:"CY",children:[
      {name:"박지우",role:"UX 디자이너",dept:"디자인팀",avatar:"PJ",children:[]}
    ]},
    {name:"한소희",role:"마케팅팀장",dept:"마케팅팀",avatar:"HS",children:[
      {name:"정도현",role:"마케터",dept:"마케팅팀",avatar:"JD",children:[]}
    ]},
  ]
};
 
function avatar(initials, dept, size=40) {
  const c = deptColors[dept]||"#6b7280";
  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${size*0.32}px;background:${c}22;border:2px solid ${c}44;color:${c}">${initials}</div>`;
}
 
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  event.currentTarget.classList.add('active');
  if(id==='dashboard') renderDashboard();
  if(id==='employees') renderEmps();
  if(id==='leave') renderLeave();
  if(id==='performance') renderPerf();
  if(id==='org') renderOrg();
}
 
function renderDashboard() {
  const pending = leaves.filter(l=>l.status==="대기").length;
  document.getElementById('dash-pending').textContent = pending+'건';
 
  const depts = ["개발팀","디자인팀","마케팅팀","경영팀"];
  document.getElementById('dept-bars').innerHTML = depts.map(dept=>{
    const count = employees.filter(e=>e.dept===dept).length;
    const pct = Math.round(count/employees.length*100);
    const c = deptColors[dept];
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
        <span style="color:#94a3b8">${dept}</span>
        <span style="color:${c};font-weight:700">${count}명</span>
      </div>
      <div style="height:6px;background:#0f1420;border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${c};border-radius:3px"></div>
      </div>
    </div>`;
  }).join('');
 
  document.getElementById('dash-leaves').innerHTML = leaves.slice(0,4).map(l=>{
    const c = statusColors[l.status];
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1e2a42">
      <div>
        <div style="font-size:13px;font-weight:600">${l.emp}</div>
        <div style="font-size:11px;color:#64748b">${l.type} · ${l.from}</div>
      </div>
      <span class="badge" style="background:${c}22;color:${c};border:1px solid ${c}44">${l.status}</span>
    </div>`;
  }).join('');
}
 
function renderEmps() {
  const q = document.getElementById('emp-search')?.value||'';
  const filtered = employees.filter(e=>e.name.includes(q)||e.dept.includes(q)||e.role.includes(q));
  const c = deptColors;
  document.getElementById('emp-grid').innerHTML = filtered.map(emp=>`
    <div class="emp-card" style="border-left:3px solid ${c[emp.dept]||'#64748b'}" onclick="openModal(${emp.id})">
      <div class="emp-header">
        ${avatar(emp.avatar,emp.dept,48)}
        <div>
          <div class="emp-name">${emp.name}</div>
          <div class="emp-role">${emp.role}</div>
          <div class="emp-dept" style="color:${c[emp.dept]}">${emp.dept} · ${emp.level}</div>
        </div>
      </div>
      <div class="emp-footer">
        입사일: <span>${emp.joinDate}</span><br>
        직속 상관: <span>${emp.manager}</span>
      </div>
    </div>`).join('');
}
 
function openModal(id) {
  const emp = employees.find(e=>e.id===id);
  const c = deptColors[emp.dept]||"#6b7280";
  document.getElementById('modal-avatar').innerHTML = emp.avatar;
  document.getElementById('modal-avatar').style.cssText += `;background:${c}22;border:2px solid ${c}44;color:${c};width:60px;height:60px;font-size:20px`;
  document.getElementById('modal-name').textContent = emp.name;
  document.getElementById('modal-role').textContent = emp.role;
  document.getElementById('modal-dept').innerHTML = `<span style="color:${c}">${emp.dept} · ${emp.level}</span>`;
  const rows = [["이메일",emp.email],["연락처",emp.phone],["입사일",emp.joinDate],["연봉",emp.salary],["직속 상관",emp.manager],["재직 상태",emp.status]];
  document.getElementById('modal-rows').innerHTML = rows.map(([k,v])=>`
    <div class="modal-row"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('');
  document.getElementById('emp-modal').classList.add('open');
}
function closeModal() { document.getElementById('emp-modal').classList.remove('open'); }
 
function renderLeave() {
  // populate select
  const sel = document.getElementById('lv-emp');
  sel.innerHTML = '<option value="">직원 선택</option>' + employees.map(e=>`<option>${e.name}</option>`).join('');
 
  document.getElementById('leave-list').innerHTML = leaves.map(l=>{
    const c = statusColors[l.status];
    return `<div class="leave-item">
      <div class="leave-top">
        <span class="leave-name">${l.emp}</span>
        <span class="badge" style="background:${c}22;color:${c};border:1px solid ${c}44">${l.status}</span>
      </div>
      <div class="leave-info">${l.type} · ${l.from} ~ ${l.to} (${l.days}일) · ${l.reason}</div>
      ${l.status==="대기"?`<div class="btn-row">
        <button class="btn" style="color:#10b981;border-color:#10b98144" onclick="setLeave(${l.id},'승인')">승인</button>
        <button class="btn" style="color:#ef4444;border-color:#ef444444" onclick="setLeave(${l.id},'반려')">반려</button>
      </div>`:''}
    </div>`;
  }).join('');
 
  document.getElementById('att-list').innerHTML = Object.entries(attendance).map(([name,d])=>`
    <div class="att-row">
      <span style="font-weight:600">${name}</span>
      <div style="display:flex;gap:12px;color:#64748b;font-size:12px">
        <span>사용 <b style="color:#f59e0b">${d.used}일</b></span>
        <span>잔여 <b style="color:#10b981">${d.total-d.used}일</b></span>
        <span>출근율 <b style="color:#3b82f6">${d.att}%</b></span>
      </div>
    </div>`).join('');
}
 
function setLeave(id, status) {
  leaves = leaves.map(l=>l.id===id?{...l,status}:l);
  renderLeave();
  renderDashboard();
}
 
function addLeave() {
  const emp = document.getElementById('lv-emp').value;
  const type = document.getElementById('lv-type').value;
  const from = document.getElementById('lv-from').value;
  const to = document.getElementById('lv-to').value;
  const reason = document.getElementById('lv-reason').value;
  if(!emp||!from||!to) return alert('직원, 시작일, 종료일을 입력해주세요');
  const days = Math.ceil((new Date(to)-new Date(from))/86400000)+1;
  leaves.push({id:Date.now(),emp,type,from,to,days,status:"대기",reason});
  document.getElementById('lv-emp').value='';
  document.getElementById('lv-from').value='';
  document.getElementById('lv-to').value='';
  document.getElementById('lv-reason').value='';
  renderLeave();
}
 
function renderPerf() {
  document.getElementById('perf-grid').innerHTML = performance.map(p=>{
    const gc = gradeColors[p.grade];
    return `<div class="perf-card" style="border-top:3px solid ${gc}">
      <div class="perf-header">
        <div>
          <div style="font-size:15px;font-weight:800">${p.emp}</div>
          <div style="font-size:12px;color:#64748b;margin-top:2px">${p.dept}</div>
        </div>
        <div class="grade-badge" style="color:${gc};background:${gc}15;border-color:${gc}44">${p.grade}</div>
      </div>
      ${[["KPI 달성",p.kpi],["동료 평가",p.peer]].map(([lbl,val])=>`
        <div class="bar-row">
          <div class="bar-label"><span>${lbl}</span><span>${val}점</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${val}%;background:${gc}"></div></div>
        </div>`).join('')}
      <div class="perf-footer">
        <div style="font-size:24px;font-weight:900">${p.score}<span style="font-size:12px;color:#64748b">점</span></div>
        <div style="color:#10b981;font-weight:700">${p.growth}</div>
      </div>
      <div style="font-size:11px;color:#64748b;margin-top:10px;line-height:1.5">${p.comment}</div>
    </div>`;
  }).join('');
}
 
function renderOrg() {
  const depts = Object.keys(deptColors);
  document.getElementById('org-legend').innerHTML = depts.map(d=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${deptColors[d]}"></div>${d}
    </div>`).join('');
 
  function nodeHTML(node) {
    const c = deptColors[node.dept]||"#6b7280";
    const box = `<div class="org-box" style="border-color:${c}55;box-shadow:0 0 20px ${c}15">
      ${avatar(node.avatar,node.dept,36)}
      <div class="o-name">${node.name}</div>
      <div class="o-role">${node.role}</div>
      <div class="o-dept" style="color:${c}">${node.dept}</div>
    </div>`;
    if(!node.children.length) return `<div class="org-node">${box}</div>`;
    const children = node.children.map(ch=>`
      <div class="org-child">
        <div class="org-line-v"></div>
        ${nodeHTML(ch)}
      </div>`).join('');
    return `<div class="org-node">
      ${box}
      <div class="org-line-v"></div>
      <div class="org-children">${children}</div>
    </div>`;
  }
  document.getElementById('org-tree').innerHTML = nodeHTML(orgData);
}
 
// init
renderDashboard();
</script>
</body>
</html>
